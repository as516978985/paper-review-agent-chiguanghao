services:
  mysql:
    image: mysql:8.0
    container_name: paper-review-mysql
    hostname: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_2026
      MYSQL_DATABASE: paper_review_agent
      MYSQL_USER: paper_review_agent
      MYSQL_PASSWORD: PaperReview_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paper-review-net

  web:
    build: .
    container_name: paper-review-web
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - paper-review-net

networks:
  paper-review-net:
    driver: bridge

volumes:
  mysql_data: